# ── Dev override ──────────────────────────────────────────────────────────────
# Extends docker-compose.yaml with bind-mounted source and hot-reload commands.
# Use via the Makefile:  make dev   (not directly)
#
# What changes vs production:
#   api     — source bind-mounted + uvicorn --reload (auto-restarts on .py saves)
#   worker  — source bind-mounted (restart manually: make dev-restart-worker)
#   web     — source bind-mounted + next dev (auto-reloads on .ts/.tsx saves)
#
# What stays the same:
#   db / redis / named volumes — identical to production compose

services:

  # ── API (hot reload) ──────────────────────────────────────────────────────────
  api:
    environment:
      APP_ENV: development
    # Run as root so bind-mounted host files (owned by the macOS user) are
    # always readable/writable inside the container.
    user: root
    volumes:
      - ../apps/api:/app
      - ../packages:/app/packages
      - uploads:/data/uploads
      - bm25indexes:/data/indexes
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir /app/app
        --reload-dir /app/packages

  # ── Worker (bind-mounted; restart manually on code changes) ──────────────────
  worker:
    environment:
      APP_ENV: development
    user: root
    volumes:
      - ../apps/worker:/app
      # Expose the API models at the same path the production image uses
      - ../apps/api:/app/apps/api
      - ../packages:/app/packages
      - uploads:/data/uploads
      - bm25indexes:/data/indexes

  # ── Web (Next.js dev server with HMR) ─────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.web.dev
    volumes:
      - ../apps/web:/app
      # Named volume keeps node_modules across restarts; avoids re-running
      # npm install from scratch every time the container starts.
      - web_dev_node_modules:/app/node_modules
    environment:
      # next.config.js reads API_URL at runtime for the /api/* rewrite.
      API_URL: http://api:8000
    # CMD is inherited from Dockerfile.web.dev: npm install && npm run dev

volumes:
  web_dev_node_modules:
